spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pixflow?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: pixflow
    password: pixflow_dev_20260705
    driver-class-name: com.mysql.cj.jdbc.Driver
pixflow:
  auth:
    admin-username: ${PIXFLOW_AUTH_ADMIN_USERNAME}
    jwt:
      secret: ${PIXFLOW_AUTH_JWT_SECRET:pixflow-dev-jwt-secret-at-least-32-bytes}
    refresh:
      cookie-secure: false
  cache:
    address: redis://localhost:6379
    env-prefix: dev
    semaphore:
      default-permits: 8
      apis:
        primary_chat: { permits: 16, lease-time: 2m }
        vision: { permits: 8, lease-time: 2m }
        imagegen: { permits: 4, lease-time: 5m }
        embedding: { permits: 8, lease-time: 2m }
        rerank: { permits: 8, lease-time: 2m }
        bg-removal: { permits: 8, lease-time: 2m }
  storage:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    auto-create-bucket: true
  vector:
    qdrant:
      host: localhost
      grpc-port: 6334
      timeout: 5s
  memory:
    insight:
      collection: analysis_insight
      expected-dimension: 1536
  mq:
    namesrv-addr: localhost:9876
    producer-group: pixflow-producer
    send-timeout: 5s
    consumer:
      consume-thread-min: 2
      consume-thread-max: 8
      consume-timeout: 5m
    in-process-retries: 2
    max-retries: 3
    retry-backoff: [5s, 30s, 2m]
    retry-mode: broker
    dlq-alert-threshold: 1
    topic-auto-create: true
  ai:
    default-provider: custom
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
    providers:
      custom:
        api-key: ${LLM_API_KEY:${DASHSCOPE_API_KEY:}}
        base-url: ${LLM_BASE_URL:${DASHSCOPE_BASE_URL:}}
    roles:
      primary-chat:
        provider: custom
        model: ${LLM_CHAT_MODEL:deepseek-ai/DeepSeek-V4-Pro}
        capability: CHAT
        temperature: 0.3
        max-tokens: 4096
      vision:
        provider: custom
        model: ${LLM_VISION_MODEL:Qwen/Qwen3-VL-32B-Instruct}
        capability: VISION
      rubrics-judge-text:
        provider: custom
        model: ${LLM_RUBRICS_JUDGE_TEXT_MODEL:${LLM_CHAT_MODEL:deepseek-ai/DeepSeek-V4-Pro}}
        capability: CHAT
        temperature: 0.0
        max-tokens: 2048
      rubrics-judge-vision:
        provider: custom
        model: ${LLM_RUBRICS_JUDGE_VISION_MODEL:${LLM_VISION_MODEL:Qwen/Qwen3-VL-32B-Instruct}}
        capability: VISION
        temperature: 0.0
        max-tokens: 2048
      imagegen:
        provider: dashscope
        model: Kwai-Kolors/Kolors
        capability: IMAGEGEN
      embedding:
        provider: dashscope
        model: Qwen/Qwen3-Embedding-8B
        capability: EMBEDDING
      rerank:
        provider: dashscope
        model: Qwen/Qwen3-Reranker-8B
        capability: RERANK
    # 以下数值仅为开发环境的 provider attempt 权重示例，不代表真实 token 或账单额度。
    quota:
      roles:
        primary-chat: { quota-group: chat, capacity: 60, refill-tokens: 60, refill-period: 1m, idle-ttl: 10m, cost-per-attempt: 1 }
        vision: { quota-group: vision, capacity: 30, refill-tokens: 30, refill-period: 1m, idle-ttl: 10m, cost-per-attempt: 2 }
        rubrics-judge-text: { quota-group: rubrics-judge-text, capacity: 30, refill-tokens: 30, refill-period: 1m, idle-ttl: 10m, cost-per-attempt: 1 }
        rubrics-judge-vision: { quota-group: rubrics-judge-vision, capacity: 15, refill-tokens: 15, refill-period: 1m, idle-ttl: 10m, cost-per-attempt: 2 }
        imagegen: { quota-group: imagegen, capacity: 20, refill-tokens: 10, refill-period: 1m, idle-ttl: 10m, cost-per-attempt: 5 }
        embedding: { quota-group: embedding, capacity: 100, refill-tokens: 100, refill-period: 1m, idle-ttl: 10m, cost-per-attempt: 1 }
        rerank: { quota-group: rerank, capacity: 100, refill-tokens: 100, refill-period: 1m, idle-ttl: 10m, cost-per-attempt: 1 }
  thirdparty:
    bg-removal:
      default-provider: removebg
    providers:
      removebg:
        type: removebg
        enabled: true
        endpoint: ${REMOVEBG_ENDPOINT:https://api.remove.bg/v1.0/removebg}
        auth:
          type: api-key
          properties:
            header: X-Api-Key
            value: ${REMOVEBG_API_KEY:}
      aliyun-market:
        type: aliyun-market-bgrem
        enabled: true
        endpoint: ${ALIYUN_BGREM_ENDPOINT:https://bgrem.market.alicloudapi.com}
        auth:
          type: header
          properties:
            header: Authorization
            value: APPCODE ${ALIYUN_BGREM_APPCODE:}
        model-type: ${ALIYUN_BGREM_MODEL_TYPE:general}
        polling:
          submit-path: /api/v1/bg-remove/submit
          status-path: /api/v1/bg-remove/query
          timeout: 30s
          interval: 1s
    # 按 provider/API 统计每一次真实出站尝试。
    outbound-quota:
      removebg:
        bg-removal: { capacity: 20, refill-tokens: 20, refill-period: 1m, idle-ttl: 10m, cost-per-attempt: 1 }
      aliyun-market:
        bg-removal: { capacity: 20, refill-tokens: 20, refill-period: 1m, idle-ttl: 10m, cost-per-attempt: 1 }
