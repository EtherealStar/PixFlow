server:
  port: 8080
  tomcat:
    threads:
      max: 200 # 最大并发

spring:
  application:
    name: pixflow
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:sk-dff895da7f2d4f7da9ab17447d90dbf5}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-v4-flash
  datasource:
    url: jdbc:mysql://localhost:3306/pixflow?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: rootpassword
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 500MB # 单文件上传体积上限（需与 pixflow.asset.zip-max-size 对齐）
      max-request-size: 600MB # 整个请求体上限（zip + 文案文档）

pixflow:
  storage:
    root: ./data/pixflow-storage # 本地文件存储根目录
  asset:
    zip-max-size: 524288000 # 上传 zip 体积上限，默认 500 MB（需求 1.3）
    extracted-max-size: 2147483648 # 解压后累计文件总大小上限，默认 2 GB（需求 1.4）
    extracted-max-count: 2000 # 解压后文件总数上限，默认 2000（需求 1.4）
    doc-max-size: 52428800 # 文案文档体积上限，默认 50 MB（需求 3.2）
    doc-max-rows: 10000 # 文案文档数据行数上限（不含表头），默认 10000（需求 3.3）
  dag:
    max-node-count: 50 # 单个 DAG 节点数上限，默认 50（需求 7.6）
  engine:
    max-concurrency: 8 # 图片处理线程池固定大小（最大并发，需求 8.3）
    copy-max-length: 2000 # 生成文案写入 generated_copy 的最大长度（需求 10.4）
    error-msg-max-length: 1000 # 失败结果 error_msg 最大长度（需求 11.2）
  security:
    zip-bomb-threshold: 104857600 # zip-bomb 阈值 (e.g. 100MB)
  content:
    copy-line-limit: 1000 # 文案行数上限
    copy-length-limit: 50000 # 文案长度上限
